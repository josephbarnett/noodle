# Tempo single-binary config (story 061, dev). OTLP/gRPC ingest from the
# collector; local block storage in the tempo-data volume; query API on 3200.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  # Flush quickly so a just-emitted trace is searchable within seconds — this
  # is a dev replay stack, not a throughput target.
  max_block_duration: 5m
  complete_block_timeout: 10s

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
