# Dev-only OTel GenAI trace stack (story 061, ADR 057). Localhost-bound,
# no auth — for reconstructing a captured trace and viewing it in Grafana
# TraceQL without a live proxy run. The production collector is separate
# (ADR 044); do not use this in production.
#
#   path: emitter → collector:4318 (OTLP/HTTP) → tempo:4317 (OTLP/gRPC) → Grafana
#
# Bring up:  docker compose -f docker/otel-genai/docker-compose.yml up -d
# Emit:      cargo run -p noodle-trace-emitter
# View:      http://127.0.0.1:3000  (Explore → Tempo → TraceQL)
# Tear down: docker compose -f docker/otel-genai/docker-compose.yml down -v
services:
  collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    command: ["--config=/etc/collector.yaml"]
    volumes:
      - ./collector.yaml:/etc/collector.yaml:ro
    ports:
      - "127.0.0.1:4318:4318" # OTLP/HTTP — the emitter / shipper POST here
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200" # Tempo query API — for direct TraceQL curl checks

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - tempo

volumes:
  tempo-data:
