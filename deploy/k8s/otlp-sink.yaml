# Mock OTLP collector for the proof — runs demos/otlp_sink.py, captures
# every POST /v1/logs, and logs one line per batch to stderr (visible
# via `kubectl logs`). The shipper points at the `noodle-otlp-sink`
# Service. The script is mounted from the `noodle-otlp-sink-script`
# ConfigMap, which deploy.sh builds from demos/otlp_sink.py.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noodle-otlp-sink
  namespace: noodle
  labels: { app: noodle-otlp-sink }
spec:
  replicas: 1
  selector:
    matchLabels: { app: noodle-otlp-sink }
  template:
    metadata:
      labels: { app: noodle-otlp-sink }
    spec:
      volumes:
        - name: script
          configMap: { name: noodle-otlp-sink-script }
      containers:
        - name: sink
          image: python:3.12-slim
          command: ["python", "/app/otlp_sink.py", "--host", "0.0.0.0", "--port", "4318", "--ui-port", "8080", "--dest", "/tmp/otlp-bodies"]
          ports:
            - { name: otlp, containerPort: 4318 }
            - { name: ui,   containerPort: 8080 }
          volumeMounts:
            - { name: script, mountPath: /app, readOnly: true }
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: noodle-otlp-sink
  namespace: noodle
  labels: { app: noodle-otlp-sink }
spec:
  type: ClusterIP
  selector: { app: noodle-otlp-sink }
  ports:
    - { name: otlp, port: 4318, targetPort: 4318 }
    - { name: ui,   port: 8080, targetPort: 8080 }
