# OTLP sink for the gateway — the real otel-collector (story 061/062). Swaps
# the earlier Python mock in place: same Deployment + Service name
# (`noodle-otlp-sink`) and port (4318), so the gateway's shipper
# (`--endpoint http://noodle-otlp-sink:4318`) keeps shipping with no change and
# no gateway roll. The collector forwards traces to Tempo (see observability.yaml).
# Config is mounted from the `noodle-collector-config` ConfigMap below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: noodle-collector-config
  namespace: noodle
  labels: { app: noodle-otlp-sink }
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      otlp/tempo:
        endpoint: noodle-tempo:4317
        tls:
          insecure: true
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo, debug]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noodle-otlp-sink
  namespace: noodle
  labels: { app: noodle-otlp-sink }
spec:
  replicas: 1
  selector:
    matchLabels: { app: noodle-otlp-sink }
  template:
    metadata:
      labels: { app: noodle-otlp-sink }
    spec:
      volumes:
        - name: config
          configMap: { name: noodle-collector-config }
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.116.1
          args: ["--config=/etc/collector.yaml"]
          ports:
            - { name: otlp, containerPort: 4318 }
          volumeMounts:
            - { name: config, mountPath: /etc/collector.yaml, subPath: collector.yaml, readOnly: true }
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: noodle-otlp-sink
  namespace: noodle
  labels: { app: noodle-otlp-sink }
spec:
  type: ClusterIP
  selector: { app: noodle-otlp-sink }
  ports:
    - { name: otlp, port: 4318, targetPort: 4318 }
