# Tempo + Grafana for the in-cluster GenAI trace stack (story 061/062). The
# gateway shipper → noodle-otlp-sink (collector, otlp-sink.yaml) → noodle-tempo
# → noodle-grafana. Dev-only, no auth; view via:
#   kubectl -n noodle port-forward svc/noodle-grafana 3000:3000
# then http://127.0.0.1:3000 → Explore → Tempo → TraceQL
#   { .gen_ai.operation.name = "invoke_agent" }
# The production collector stays separate (ADR 044); this stack is for the
# home cluster + port-forward UX.
apiVersion: v1
kind: ConfigMap
metadata:
  name: noodle-tempo-config
  namespace: noodle
  labels: { app: noodle-tempo }
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
    ingester:
      max_block_duration: 5m
      complete_block_timeout: 10s
    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noodle-tempo
  namespace: noodle
  labels: { app: noodle-tempo }
spec:
  replicas: 1
  selector:
    matchLabels: { app: noodle-tempo }
  template:
    metadata:
      labels: { app: noodle-tempo }
    spec:
      volumes:
        - name: config
          configMap: { name: noodle-tempo-config }
        - name: data
          emptyDir: {}
      containers:
        - name: tempo
          image: grafana/tempo:2.6.1
          args: ["-config.file=/etc/tempo.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: http, containerPort: 3200 }
          volumeMounts:
            - { name: config, mountPath: /etc/tempo.yaml, subPath: tempo.yaml, readOnly: true }
            - { name: data, mountPath: /var/tempo }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: noodle-tempo
  namespace: noodle
  labels: { app: noodle-tempo }
spec:
  type: ClusterIP
  selector: { app: noodle-tempo }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: http, port: 3200, targetPort: 3200 }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: noodle-grafana-datasources
  namespace: noodle
  labels: { app: noodle-grafana }
data:
  tempo.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://noodle-tempo:3200
        isDefault: true
        jsonData:
          nodeGraph:
            enabled: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: noodle-grafana
  namespace: noodle
  labels: { app: noodle-grafana }
spec:
  replicas: 1
  selector:
    matchLabels: { app: noodle-grafana }
  template:
    metadata:
      labels: { app: noodle-grafana }
    spec:
      volumes:
        - name: datasources
          configMap: { name: noodle-grafana-datasources }
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin" }
            - { name: GF_AUTH_DISABLE_LOGIN_FORM, value: "true" }
            - { name: GF_FEATURE_TOGGLES_ENABLE, value: "traceqlEditor" }
          ports:
            - { name: http, containerPort: 3000 }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources, readOnly: true }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: noodle-grafana
  namespace: noodle
  labels: { app: noodle-grafana }
spec:
  type: ClusterIP
  selector: { app: noodle-grafana }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
