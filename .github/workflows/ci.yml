name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref. Saves runner minutes when a
# branch gets multiple pushes quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Don't waste cycles building with incremental on CI — produces a
  # net slowdown for one-shot runs and bloats the cache.
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy --workspace --all-targets -- -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: crates/noodle-viewer/web/package-lock.json
      - name: Build viewer web/dist (rust-embed reads it at compile time)
        working-directory: crates/noodle-viewer/web
        run: |
          npm ci
          npm run build
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test --workspace
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: crates/noodle-viewer/web/package-lock.json
      - name: Build viewer web/dist (rust-embed reads it at compile time)
        working-directory: crates/noodle-viewer/web
        run: |
          npm ci
          npm run build
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-fail-fast
      # Exec-claude e2e is #[ignore]d and requires claude + Anthropic
      # auth — runs locally and in the nightly job, not on PR/push gates.
